<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pelacak Pengeluaran</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="logo">?? Pelacak Pengeluaran</div>
      <button id="themeToggle" class="theme-toggle" type="button">??</button>
    </div>
  </header>

  <main class="container">
    <section class="total-card">
      <h2>Total Pengeluaran</h2>
      <div id="totalAmount" class="total-amount">Rp 0</div>
    </section>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="dashboard" type="button">Dashboard</button>
      <button class="tab-btn" data-tab="add" type="button">Tambah</button>
      <button class="tab-btn" data-tab="summary" type="button">Ringkasan</button>
      <button class="tab-btn" data-tab="settings" type="button">Pengaturan</button>
    </nav>

    <section id="dashboard" class="tab-content active">
      <div class="monthly-summary-card">
        <h3>Ringkasan Bulan Ini</h3>
        <div id="monthlySummaryCard" class="monthly-summary-content"></div>
      </div>

      <div class="chart-section">
        <h3>Distribusi Kategori</h3>
        <canvas id="categoryChart" width="300" height="300"></canvas>
      </div>

      <div class="filters">
        <div class="filter-group">
          <label for="sortBy">Urutkan</label>
          <select id="sortBy">
            <option value="date-desc">Tanggal Terbaru</option>
            <option value="date-asc">Tanggal Terlama</option>
            <option value="amount-desc">Jumlah Terbesar</option>
            <option value="amount-asc">Jumlah Terkecil</option>
            <option value="category">Kategori</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filterCategory">Filter Kategori</label>
          <select id="filterCategory">
            <option value="">Semua Kategori</option>
          </select>
        </div>
      </div>

      <div id="budgetWarning" class="budget-warning" style="display:none;"></div>

      <section class="list-section">
        <h3>Daftar Pengeluaran</h3>
        <div id="transactionList" class="transaction-list"></div>
      </section>
    </section>

    <section id="add" class="tab-content">
      <form id="transactionForm" class="transaction-form">
        <div class="form-group">
          <label for="transactionName">Nama Pengeluaran</label>
          <input id="transactionName" type="text" required />
        </div>

        <div class="form-group">
          <label for="transactionAmount">Jumlah</label>
          <input id="transactionAmount" type="number" min="1" required />
        </div>

        <div class="form-group">
          <label for="transactionCategory">Kategori</label>
          <div class="category-input">
            <select id="transactionCategory" required>
              <option value="">Pilih Kategori...</option>
            </select>
            <button id="newCategoryBtn" class="btn-secondary" type="button">+ Kategori</button>
          </div>
        </div>

        <div id="newCategoryGroup" class="form-group" style="display:none;">
          <label for="newCategoryName">Kategori Baru</label>
          <input id="newCategoryName" type="text" />
          <div class="button-group" style="margin-top: 0.5rem;">
            <button id="saveCategoryBtn" class="btn-primary" type="button">Simpan</button>
            <button id="cancelCategoryBtn" class="btn-danger" type="button">Batal</button>
          </div>
        </div>

        <div class="form-group">
          <label for="transactionDate">Tanggal</label>
          <input id="transactionDate" type="date" required />
        </div>

        <div class="form-group">
          <label for="transactionNote">Catatan</label>
          <textarea id="transactionNote" rows="3"></textarea>
        </div>

        <button class="btn-primary" type="submit">Simpan Pengeluaran</button>
      </form>
    </section>

    <section id="summary" class="tab-content">
      <div class="summary-section">
        <h3>Ringkasan Bulanan</h3>
        <div class="form-group">
          <label for="summaryMonth">Pilih Bulan</label>
          <input id="summaryMonth" type="month" />
        </div>
        <div id="summaryContent" class="summary-content"></div>
      </div>
    </section>

    <section id="settings" class="tab-content">
      <div class="settings-section">
        <h3>Pengaturan</h3>

        <div class="setting-item">
          <h4>Batas Pengeluaran Bulanan</h4>
          <div class="form-group">
            <input id="budgetLimit" type="number" min="1" />
          </div>
          <button id="saveBudgetBtn" class="btn-primary" type="button">Simpan Batas</button>
          <p id="budgetInfo" class="info-text"></p>
        </div>

        <div class="setting-item">
          <h4>Kelola Kategori</h4>
          <div id="categoriesList" class="categories-list"></div>
        </div>

        <div class="setting-item">
          <h4>Data</h4>
          <div class="button-group">
            <button id="exportBtn" class="btn-secondary" type="button">Export</button>
            <button id="importBtn" class="btn-secondary" type="button">Import</button>
          </div>
          <input id="importFile" type="file" accept="application/json" style="display:none;" />
          <button id="clearDataBtn" class="btn-danger" type="button" style="margin-top:0.75rem;">Hapus Semua Data</button>
        </div>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
